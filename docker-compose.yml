version: "3.9"

services:
  # ─────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: canvasos
      POSTGRES_USER: canvasos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-canvasos_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/api/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canvasos"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # CanvasOS API (Fastify + Yjs)
  # ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: "postgresql://canvasos:${POSTGRES_PASSWORD:-canvasos_dev}@postgres:5432/canvasos"
      CORS_ORIGIN: "http://localhost:3000,https://canvasos.art"
      LOG_LEVEL: "info"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────
  # AI Gateway (Local Stable Diffusion)
  # ─────────────────────────────────────────────
  ai-gateway:
    build:
      context: services/ai-gateway
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      SD_MODEL: "stabilityai/stable-diffusion-2-1"
      PORT: "8001"
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    # GPU support (uncomment if NVIDIA GPU available)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    profiles:
      - ai  # only start with: docker compose --profile ai up

  # ─────────────────────────────────────────────
  # Web (dev mode — for production, serve dist with nginx)
  # ─────────────────────────────────────────────
  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./apps/web/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    profiles:
      - web

volumes:
  postgres_data:
  huggingface_cache:
